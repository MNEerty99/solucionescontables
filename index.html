<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soluciones Contables — El colaborador que tu estudio merece.</title>
  <meta name="description" content="Soluciones Contables no es un software más. Es el colaborador digital de tu estudio contable: automatiza el IVA, los comprobantes y el control de monotributo para que vos te enfoques en asesorar.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Fix #6: Preload background slideshow images to prevent first-transition flicker -->
  <link rel="preload" as="image" href="/corporate_bg.jpg">
  <link rel="preload" as="image" href="/corporate_bg_2.jpg">
  <link rel="preload" as="image" href="/corporate_bg_3.jpg">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="./css/landing.css">
  <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>

  <!-- Main Container that switches view dynamically -->
  <div id="view-root">
    <!-- View content will be injected here by main.js -->
    <div class="initial-loading">
      <div class="spinner"></div>
      <p>Cargando Soluciones Contables...</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Application Script -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
